# docker-compose.yml
version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    volumes:
      - ./processed_data:/app/processed_data  # Mounts data so you don't copy massive CSVs into the image
    environment:
      - TF_USE_LEGACY_KERAS=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8000:8000"
    volumes:
      - ./processed_data:/app/processed_data
    environment:
      # Docker networking magic: 'backend' resolves to the container above
      - API_URL=http://backend:8001/recommend 
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - backend
